<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To The Clumsy Corsair</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  :root {
    --text-dark: #1e293b;
    --glass: rgba(255, 255, 255, 0.25); 
    --border-glass: rgba(255, 255, 255, 0.5);
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    margin: 0;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(-45deg, #ff7e5f, #feb47b, #24c6dc, #514a9d);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: var(--text-dark);
    overflow: hidden; 
    height: 100vh;
    width: 100vw;
  }

  /* MASSIVE JOLLY ROGER WATERMARK */
  #jolly-roger-bg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80vmin; height: 80vmin;
    background-image: url('jolly-roger.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.08; 
    z-index: 1;
    pointer-events: none;
  }

  /* PIRATE WATERMARK ICONS */
  #icon-pattern { position: absolute; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
  .bg-icon { position: absolute; color: rgba(255, 255, 255, 0.25); font-size: 4rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
  .icon-1 { top: 10%; left: 10%; transform: rotate(-15deg); } 
  .icon-2 { top: 15%; left: 80%; transform: rotate(20deg); font-size: 5rem; } 
  .icon-3 { top: 40%; left: 5%; transform: rotate(10deg); font-size: 3.5rem; } 
  .icon-4 { top: 45%; left: 85%; transform: rotate(-25deg); } 
  .icon-5 { top: 75%; left: 15%; transform: rotate(15deg); font-size: 4.5rem; } 
  .icon-6 { top: 80%; left: 75%; transform: rotate(-10deg); } 
  .icon-7 { top: 5%; left: 45%; transform: rotate(5deg); font-size: 3rem; } 
  .icon-8 { top: 50%; left: 45%; transform: rotate(-5deg); font-size: 5rem; } 
  .icon-9 { top: 90%; left: 45%; transform: rotate(15deg); } 
  .icon-10 { top: 30%; left: 25%; transform: rotate(-20deg); font-size: 3rem; } 

  /* LANDING PAGE */
  .container {
    height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 20px; box-sizing: border-box; position: relative; z-index: 10;
  }
  h1 { font-family: 'Pirata One', serif; font-size: 5rem; margin-bottom: 5px; color: white; text-shadow: 0 4px 15px rgba(0,0,0,0.4); letter-spacing: 2px; }
  .subtitle { color: rgba(255,255,255,0.95); margin-bottom: 50px; font-size: 1.2rem; font-weight: 500; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
  .start-btn {
    padding: 18px 40px; border-radius: 5px; border: 2px solid #fff; background: rgba(255, 255, 255, 0.9); color: #d946ef;
    font-size: 1.5rem; font-family: 'Pirata One', serif; cursor: pointer; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    letter-spacing: 2px; transition: 0.2s;
  }
  .start-btn:active { transform: scale(0.95); }

  /* STORY MODE UI */
  #story-mode {
    position: fixed; inset: 0; background-color: rgba(0,0,0,0.1); backdrop-filter: blur(8px); 
    z-index: 100; display: none; flex-direction: column; opacity: 0; transition: opacity 1.5s ease;
  }
  .progress-container { display: flex; gap: 4px; padding: 20px 10px; position: absolute; top: 0; width: 100%; box-sizing: border-box; z-index: 150; }
  .progress-bar { flex: 1; height: 6px; background: rgba(0,0,0,0.3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; width: 0%; background: #fbbf24; } 
  .progress-bar.completed .progress-fill { width: 100%; }

  #story-content-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; z-index: 120; }

  /* THE DIGITAL GLASS CARD (For normal logs) */
  .content-card {
    background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border-glass); border-radius: 20px; padding: 40px; max-width: 600px; width: 90%;
    text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: cardIn 0.5s ease-out forwards;
    max-height: 75vh; overflow-y: auto; 
  }
  .content-card h2 { font-family: 'Pirata One', serif; font-size: 3.5rem; margin-top: 0; margin-bottom: 15px; color: #86198f; line-height: 1; letter-spacing: 1px; }
  .content-card p { font-family: 'SF Pro Display', sans-serif; font-size: 1.25rem; line-height: 1.6; font-weight: 500; color: #1e293b; margin-bottom: 0; }
  
  /* THE ANCIENT SCROLL (For the final treasure) */
  .scroll-card {
    background-color: #f4e4bc; 
    background-image: 
      linear-gradient(to right, rgba(166, 124, 0, 0.1) 0%, rgba(255, 255, 255, 0) 10%, rgba(255, 255, 255, 0) 90%, rgba(166, 124, 0, 0.1) 100%),
      radial-gradient(ellipse at center, rgba(255,255,255,0) 0%, rgba(166, 124, 0, 0.15) 100%);
    border: 1px solid #c9a75c; border-radius: 4px; padding: 50px 40px; max-width: 600px; width: 90%;
    text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 40px rgba(139, 90, 43, 0.2);
    animation: cardIn 0.5s ease-out forwards; max-height: 75vh; overflow-y: auto; 
  }
  .scroll-card h2 { font-family: 'Pirata One', serif; font-size: 4rem; margin-top: 0; margin-bottom: 20px; color: #4e342e; }
  .scroll-card p, .scroll-card b { font-family: 'Georgia', serif; font-size: 1.25rem; line-height: 1.8; color: #3e2723; }

  @keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
  
  .tap-zone { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 140; cursor: pointer; }
  .tap-left { left: 0; } .tap-right { right: 0; }

  /* END SCREEN UI */
  #end-screen {
    display: none; flex-direction: column; justify-content: center; align-items: center;
    position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); z-index: 180;
  }
  .end-box {
    background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border-glass);
    border-radius: 20px; padding: 40px; text-align: center; color: white; max-width: 400px; width: 80%;
  }
  .end-box h2 { font-family: 'Pirata One', serif; margin-top: 0; font-size: 3rem; letter-spacing: 1px;}
  .end-btn { padding: 15px 30px; margin: 10px 5px; border-radius: 5px; border: none; font-size: 1.2rem; font-family: 'Pirata One', serif; cursor: pointer; width: 80%; letter-spacing: 1px;}
  .btn-rewind { background: #fbbf24; color: #1e293b; }
  .btn-close { background: white; color: #86198f; }

  /* =========================================
     MINI-GAME UI STYLES
  ========================================= */
  #game-overlay { display: none; flex-direction
