<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For the person closest to sunshine</title>

<style>
  :root {
    --pink-core: #ffafbd;
    --blue-core: #2193b0;
    --text-dark: #1f2937;
    --glass: rgba(255, 255, 255, 0.15);
    --border-glass: rgba(255, 255, 255, 0.3);
  }

  /* 1. ANIMATED GRADIENT BACKGROUND */
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    margin: 0;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: white;
    overflow: hidden; /* Lock scroll for immersive feel */
    height: 100vh;
    width: 100vw;
  }

  /* 2. LANDING PAGE STYLES */
  .container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 10;
  }

  h1 { 
    font-size: 3rem; 
    margin-bottom: 10px; 
    background: linear-gradient(to right, #ffffff, #ffe4e6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
  }
  
  .subtitle { 
    color: rgba(255,255,255,0.8); 
    margin-bottom: 50px; 
    font-size: 1.2rem; 
    font-weight: 300;
  }

  .start-btn {
    padding: 18px 40px;
    border-radius: 50px;
    border: none;
    background: white;
    color: #e73c7e;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .start-btn:active { transform: translateY(1px); }

  /* 3. STORY MODE OVERLAY */
  #story-mode {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6); /* Darken bg slightly for content focus */
    backdrop-filter: blur(10px); /* Blur the animated BG */
    z-index: 100;
    display: none;
    flex-direction: column;
    color: white;
  }

  /* 4. PROFESSIONAL PROGRESS BARS */
  .progress-container {
    display: flex;
    gap: 4px;
    padding: 20px 10px;
    position: absolute;
    top: 0;
    width: 100%;
    box-sizing: border-box;
    z-index: 150;
  }

  .progress-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: white;
    border-radius: 2px;
  }

  .progress-bar.completed .progress-fill { width: 100%; }

  /* 5. GLASSMORPHISM CONTENT CARD */
  #story-content-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
  }

  .content-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    border-radius: 30px;
    padding: 40px;
    max-width: 600px;
    width: 90%;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.2);
    z-index: 120;
    position: relative;
    /* Slide in animation per card */
    animation: cardIn 0.5s ease-out forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .content-card h2 { 
    font-size: 2.8rem; 
    margin-top: 0;
    margin-bottom: 15px;
    color: #a5f3fc; /* Cyan accent */
    line-height: 1.1;
  }
  
  .content-card p { 
    font-size: 1.25rem; 
    line-height: 1.6; 
    font-weight: 300;
    color: rgba(255,255,255,0.95);
    margin-bottom: 0;
  }

  /* The image/gif within the card */
  #story-img { 
    max-width: 100%; 
    height: auto; 
    max-height: 35vh; 
    border-radius: 20px; 
    margin-top: 25px; 
    border: 4px solid white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    display: none; /* Hidden unless src exists */
  }

  /* 6. FLOATING DOODLES LAYER */
  .doodle-layer {
    position: absolute;
    inset: 0;
    z-index: 110; /* Behind card, in front of BG */
    overflow: hidden;
    pointer-events: none; /* Don't block taps */
  }

  .doodle {
    position: absolute;
    font-size: 4rem; /* Placeholder size for emojis */
    opacity: 0;
    animation: floatIn 0.6s ease-out forwards;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
  }

  @keyframes floatIn {
    0% { opacity: 0; transform: translateY(20px) rotate(-10deg); }
    100% { opacity: 0.7; transform: translateY(0) rotate(0deg); }
  }

  /* Specific positions for doodles - customize in JS */
  .doodle-1 { top: 10%; left: 10%; animation-delay: 0.2s; }
  .doodle-2 { bottom: 15%; right: 10%; animation-delay: 0.4s; font-size: 6rem;}
  .doodle-3 { top: 20%; right: 15%; animation-delay: 0.3s; }
  .doodle-4 { bottom: 20%; left: 15%; animation-delay: 0.5s; }

  /* 7. INTERACTION ELEMENTS */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%; /* Narrower tap zones to avoid accidental clicks on 'reveal' */
    z-index: 140;
    cursor: pointer;
  }
  .tap-left { left: 0; }
  .tap-right { right: 0; }

  .reveal-btn {
    position: relative;
    z-index: 160; /* Top layer */
    margin-top: 25px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(5px);
  }

  .reveal-text {
    margin-top: 20px;
    font-size: 1.1rem;
    color: #fca5a5;
    display: none;
    z-index: 160;
    position: relative;
    font-style: italic;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 15px;
  }
</style>
</head>

<body>

<audio id="bg-music" src="bg-music.mp3" loop></audio>

<div class="container">
  <div class="doodle-layer">
    <span class="doodle doodle-1" style="opacity: 0.2">✨</span>
    <span class="doodle doodle-2" style="opacity: 0.2">☀️</span>
  </div>
  <h1>To Sunshine ☀️</h1>
  <p class="subtitle">a tiny chaotic corner of the internet made just for you</p>
  <button class="start-btn" onclick="startWrapped()">Open Present</button>
</div>

<div id="story-mode">
  <div class="progress-container" id="progress-container"></div>
  
  <div class="tap-zone tap-left" onclick="prevStory()"></div>
  <div class="tap-zone tap-right" onclick="nextStory()"></div>

  <div id="story-content-wrapper">
    <div class="doodle-layer" id="doodle-factory"></div>

    <div class="content-card" id="active-card">
        <h2 id="story-title"></h2>
        <p id="story-body"></p>
        <img id="story-img" src="" alt="visual">
        <div id="extra-content"></div>
    </div>
  </div>
</div>

<script>
const data = [
  {
    title: "Internet Degenerate",
    body: "You catch references in places where most normies would completely miss them. substantive proof detected.",
    img: "https://media1.tenor.com/m/6q8K7mXJ8xQAAAAC/confused-woman.gif",
    // Customize doodles per slide here! Use Emojis as placeholders.
    // Replace with raw <img src="github-link-to-doodle.png"> tags later.
    doodles: ["💻", "🐸", "🌐", "🔗"] 
  },
  {
    title: "Fake Samay Fan?",
    body: "It's genuinely crazy how got addicted to the most famous comedian who also streamed... when was the laaaast time you used vocab? Allegations pending.",
    doodles: ["🎙️", "♟️", "🤫", "🤡"]
  },
  {
    title: "Directionless Zoro",
    body: "I genuinely have no clue how is someone more directionless than me in this entire world. Like HUH!?",
    img: "https://media1.tenor.com/m/1D7mP4r2Q7cAAAAC/zoro-lost.gif",
    // ZORO DOODLES PLACES
    doodles: ["⚔️", "🧭", "🟢", "🗺️"] 
  },
  {
    title: "Powfu Fraud Check",
    body: "Many people have heard the songs yeah, but the name? 10 seconds to admit if you googled that.",
    doodles: ["🎧", "🌧️", "💔", "🎵"]
  },
  {
    title: "Pinky Credibility",
    body: "Glad there is something tangible I can do after which I know no matter what happens you'll not let it get out ever.",
    doodles: ["🤙", "🔐", "🤫", "🤝"]
  },
  {
    title: "F1 Junkie",
    body: "Gosh am I soooo happy you finally got into it... I finally have someone to share my addiction with 😭😭",
    // F1 DOODLES PLACES
    doodles: ["🏎️", "🏁", "🍾", "🔧"] 
  },
  {
    title: "Actual Sunlight",
    body: "A simple yet elegant way of making sure people feel warm around you. legit don't know any other way to describe the feeling.",
    doodles: ["☀️", "🌻", "🧡", "✨"]
  },
  {
    title: "Professional Caretaker",
    body: "You help not just because it's the right thing to do, but also because it's something you want to do.",
    doodles: ["🩹", "🧸", "🍵", "💖"]
  },
  {
    title: "Bubbly Cartoon",
    body: "When you are not having your emo phase, you have a cartoonish charm, honestly.",
    doodles: ["🫧", "🤪", "🌈", "🍭"]
  },
  {
    title: "Navigation Criminal",
    body: "If there were three correct paths, there is a non-zero chance you would create a fifth option somehow.",
    // HIP HOP MICS PLACES (Seedhe Maut / Kr$na ref implies lyrical navigation)
    doodles: ["🎤", "🚧", "🗺️", "🚫"] 
  },
  {
    title: "Happy Birthday.",
    body: `Happy birthday to one of the kindest people I know.<br><br>
    I considers you close to the word sunshine. Always looking out for others even when you yourself are in the dumps. Life hasn’t been fair, but look at you still trying to hold the mantle of justice.<br><br>
    There are really small moments which are legit anchor points in my memory... Stuff as simple as ruffling my hair. I might have honestly cried that evening. It was so niceee.<br><br>
    Once a year you get to have this day for yourself. Keep it the way you like it.<br><br>
    <b>Have fuuuun!!</b>`,
    doodles: ["🎂", "🎉", "🎁", "☀️"]
  }
];

let currentIndex = 0;

// Fade-in Audio Settings
const targetVolume = 0.2; 
const fadeDuration = 3000; 

function startWrapped() {
  document.getElementById('story-mode').style.display = 'flex';
  
  // 1. Setup Audio Fade-In
  const bgMusic = document.getElementById('bg-music');
  bgMusic.volume = 0; 
  if (bgMusic.src && !bgMusic.src.endsWith("html")) { // Check if valid src exists
      bgMusic.play().then(() => {
          const intervalTime = 50; 
          const volumeStep = targetVolume / (fadeDuration / intervalTime);
          const fadeAudio = setInterval(() => {
            if (bgMusic.volume < targetVolume) {
              bgMusic.volume = Math.min(bgMusic.volume + volumeStep, targetVolume);
            } else {
              clearInterval(fadeAudio);
            }
          }, intervalTime);
      }).catch(e => console.log("Audio waiting for user link."));
  }

  setupProgressBars();
  renderStory();
}

function setupProgressBars() {
  const container = document.getElementById('progress-container');
  container.innerHTML = '';
  data.forEach((_, i) => {
    container.innerHTML += `
      <div class="progress-bar" id="bar-${i}">
        <div class="progress-fill"></div>
      </div>
    `;
  });
}

function renderStory() {
  const d = data[currentIndex];
  
  // Update Progress Bars
  data.forEach((_, i) => {
    const bar = document.getElementById(`bar-${i}`);
    if (i <= currentIndex) bar.classList.add('completed');
    else bar.classList.remove('completed');
  });

  // 1. Populate Doodles
  const factory = document.getElementById('doodle-factory');
  factory.innerHTML = ''; // Clear old doodles
  if(d.doodles) {
    d.doodles.forEach((doodleData, index) => {
        // Here you would change 'span' to 'img' and set src=doodleData 
        // if you upload PNG doodles to GitHub.
        const span = document.createElement('span');
        span.className = `doodle doodle-${index + 1}`;
        span.innerHTML = doodleData; // Currently uses emojis
        factory.appendChild(span);
    });
  }

  // 2. Populate Card (Triggering CSS Animation)
  const card = document.getElementById('active-card');
  const title = document.getElementById('story-title');
  const body = document.getElementById('story-body');
  const img = document.getElementById('story-img');
  const extra = document.getElementById('extra-content');

  // Restart Animation
  card.style.animation = 'none';
  card.offsetHeight; /* trigger reflow */
  card.style.animation = null; 

  title.innerText = d.title;
  body.innerHTML = d.body; // Use innerHTML to handle linebreaks in final slide

  if(d.img) {
    img.src = d.img;
    img.style.display = 'inline-block';
  } else {
    img.style.display = 'none';
  }

  // Handle 'Tap to Inspect' (Extra data)
  extra.innerHTML = '';
  if(d.extra) {
    extra.innerHTML = `
      <button class="reveal-btn" onclick="toggleReveal(event)">Tap to Inspect 🔍</button>
      <div class="reveal-text" id="reveal">${d.extra}</div>
    `;
  }
}

function toggleReveal(e) {
  e.stopPropagation(); // Prevents tapping from triggering nextStory()
  const r = document.getElementById("reveal");
  r.style.display = r.style.display === "block" ? "none" : "block";
}

function nextStory() {
  if (currentIndex < data.length - 1) {
    currentIndex++;
    renderStory();
  } else {
    // End of experience
    document.getElementById('story-mode').style.display = 'none';
    const bgMusic = document.getElementById('bg-music');
    // Optional: Fade out music before stopping?
    bgMusic.pause();
    bgMusic.currentTime = 0; // Reset song
    currentIndex = 0; 
  }
}

function prevStory() {
  if (currentIndex > 0) {
    currentIndex--;
    renderStory();
  }
}
</script>

</body>
</html>
