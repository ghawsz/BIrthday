<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For the person closest to sunshine</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  :root {
    --text-dark: #1e293b;
    /* Light frosted glass effect */
    --glass: rgba(255, 255, 255, 0.3); 
    --border-glass: rgba(255, 255, 255, 0.5);
  }

  /* --- THE VIBRANT PINK-TO-BLUE GRADIENT --- */
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body {
    margin: 0;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    /* Beautiful, bright pink to soft blue transition */
    background: linear-gradient(-45deg, #ff758c, #ff7eb3, #a1c4fd, #c2e9fb);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    color: var(--text-dark);
    overflow: hidden; 
    height: 100vh;
    width: 100vw;
  }

  /* --- WATERMARK ICONS --- */
  #icon-pattern {
    position: absolute;
    inset: 0;
    z-index: 1; 
    overflow: hidden;
    pointer-events: none;
  }

  .bg-icon {
    position: absolute;
    /* Soft white icons that look like clouds/light */
    color: rgba(255, 255, 255, 0.3); 
    font-size: 4rem; 
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
  }

  .icon-1 { top: 10%; left: 10%; transform: rotate(-15deg); } 
  .icon-2 { top: 15%; left: 80%; transform: rotate(20deg); font-size: 5rem; } 
  .icon-3 { top: 40%; left: 5%; transform: rotate(10deg); font-size: 3.5rem; } 
  .icon-4 { top: 45%; left: 85%; transform: rotate(-25deg); } 
  .icon-5 { top: 75%; left: 15%; transform: rotate(15deg); font-size: 4.5rem; } 
  .icon-6 { top: 80%; left: 75%; transform: rotate(-10deg); } 
  .icon-7 { top: 5%; left: 45%; transform: rotate(5deg); font-size: 3rem; } 
  .icon-8 { top: 50%; left: 45%; transform: rotate(-5deg); font-size: 5rem; } 
  .icon-9 { top: 90%; left: 45%; transform: rotate(15deg); } 
  .icon-10 { top: 30%; left: 25%; transform: rotate(-20deg); font-size: 3rem; } 
  .icon-11 { top: 60%; left: 70%; transform: rotate(25deg); } 
  .icon-12 { top: 85%; left: 40%; transform: rotate(-15deg); } 

  /* --- LANDING PAGE --- */
  .container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 10;
  }

  h1 { 
    font-size: 3.5rem; 
    margin-bottom: 10px; 
    color: white;
    text-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  
  .subtitle { 
    color: rgba(255,255,255,0.9); 
    margin-bottom: 50px; 
    font-size: 1.2rem; 
    font-weight: 500;
  }

  .start-btn {
    padding: 18px 40px;
    border-radius: 50px;
    border: none;
    background: white;
    color: #ff758c;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 117, 140, 0.4);
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(255, 117, 140, 0.6);
  }

  /* --- STORY MODE OVERLAY --- */
  #story-mode {
    position: fixed;
    inset: 0;
    background-color: rgba(255,255,255,0.1); 
    backdrop-filter: blur(5px); 
    z-index: 100;
    display: none;
    flex-direction: column;
    opacity: 0; 
    transition: opacity 1.5s ease;
  }

  /* --- PROGRESS BARS --- */
  .progress-container {
    display: flex;
    gap: 4px;
    padding: 20px 10px;
    position: absolute;
    top: 0;
    width: 100%;
    box-sizing: border-box;
    z-index: 150;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: rgba(0,0,0,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: white;
  }
  .progress-bar.completed .progress-fill { width: 100%; }

  /* --- CONTENT CARD --- */
  #story-content-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    z-index: 120; 
  }

  .content-card {
    background: var(--glass);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--border-glass);
    border-radius: 30px;
    padding: 40px;
    max-width: 600px;
    width: 90%;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    animation: cardIn 0.5s ease-out forwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .content-card h2 { 
    font-size: 2.8rem; 
    margin-top: 0;
    margin-bottom: 15px;
    color: #be185d; /* Deep pink so it pops against the glass */
    line-height: 1.1;
  }
  
  .content-card p { 
    font-size: 1.25rem; 
    line-height: 1.6; 
    font-weight: 500;
    color: #334155; /* Slate grey for readability */
    margin-bottom: 0;
  }

  /* --- INTERACTION ELEMENTS --- */
  .tap-zone {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 30%; 
    z-index: 140;
    cursor: pointer;
  }
  .tap-left { left: 0; }
  .tap-right { right: 0; }

  .reveal-btn {
    position: relative;
    z-index: 160; 
    margin-top: 25px;
    padding: 12px 24px;
    background: white;
    border: none;
    color: #ff758c;
    border-radius: 30px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .reveal-text {
    margin-top: 20px;
    font-size: 1.1rem;
    color: #be185d;
    display: none;
    z-index: 160;
    position: relative;
    font-style: italic;
    border-top: 1px solid rgba(0,0,0,0.1);
    padding-top: 15px;
  }
</style>
</head>

<body>

<audio id="bg-music" src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" loop></audio>

<div id="icon-pattern">
  <i class="fa-solid fa-sun bg-icon icon-1"></i>
  <i class="fa-solid fa-scale-balanced bg-icon icon-2"></i>
  <i class="fa-solid fa-compass bg-icon icon-3"></i>
  <i class="fa-solid fa-microphone bg-icon icon-4"></i>
  <i class="fa-solid fa-car-side bg-icon icon-5"></i>
  <i class="fa-solid fa-handshake-angle bg-icon icon-6"></i>
  <i class="fa-solid fa-cloud-rain bg-icon icon-7"></i>
  <i class="fa-solid fa-book bg-icon icon-8"></i>
  <i class="fa-solid fa-laptop bg-icon icon-9"></i>
  <i class="fa-solid fa-film bg-icon icon-10"></i>
  <i class="fa-solid fa-users bg-icon icon-11"></i>
  <i class="fa-solid fa-moon bg-icon icon-12"></i>
</div>

<div class="container">
  <h1>To Sunshine ☀️</h1>
  <p class="subtitle">a tiny chaotic corner of the internet made just for you</p>
  <button class="start-btn" onclick="startWrapped()">Open Present</button>
</div>

<div id="story-mode">
  <div class="progress-container" id="progress-container"></div>
  <div class="tap-zone tap-left" onclick="prevStory()"></div>
  <div class="tap-zone tap-right" onclick="nextStory()"></div>

  <div id="story-content-wrapper">
    <div class="content-card" id="active-card">
        <h2 id="story-title"></h2>
        <p id="story-body"></p>
        <div id="extra-content"></div>
    </div>
  </div>
</div>

<script>
const data = [
  {
    title: "Internet Degenerate",
    body: "You catch references in places where most normies would completely miss them. substantive proof detected.",
    extra: "visible confusion detected"
  },
  {
    title: "Fake Samay Fan?",
    body: "It's genuinely crazy how got addicted to the most famous comedian who also streamed... when was the laaaast time you used vocab? Allegations pending.",
    extra: "Uchalte hue bolti firti samay ki fan samay ki fan, when was the laaaast time you have used either craaazy ho gaya ya fir achaaaa in your vocab? Fake Samay fan."
  },
  {
    title: "Directionless Zoro",
    body: "I genuinely have no clue how is someone more directionless than me in this entire world. Like HUH!?",
  },
  {
    title: "Powfu Fraud Check",
    body: "Many people have heard the songs yeah, but the name? 10 seconds to admit if you googled that.",
  },
  {
    title: "Pinky Credibility",
    body: "Glad there is something tangible I can do after which I know no matter what happens you'll not let it get out ever.",
  },
  {
    title: "F1 Junkie",
    body: "Gosh am I soooo happy you finally got into it... I finally have someone to share my addiction with 😭😭",
  },
  {
    title: "Actual Sunlight",
    body: "A simple yet elegant way of making sure people feel warm around you. legit don't know any other way to describe the feeling.",
  },
  {
    title: "Professional Caretaker",
    body: "You help not just because it's the right thing to do, but also because it's something you want to do.",
  },
  {
    title: "Bubbly Cartoon",
    body: "When you are not having your emo phase, you have a cartoonish charm, honestly.",
  },
  {
    title: "Navigation Criminal",
    body: "If there were three correct paths, there is a non-zero chance you would create a fifth option somehow.",
  },
  {
    title: "Happy Birthday.",
    body: `Happy birthday to one of the kindest people I know.<br><br>
    I consider you close to the word sunshine. Always looking out for others even when you yourself are in the dumps. Life hasn’t been fair, but look at you still trying to hold the mantle of justice.<br><br>
    There are really small moments which are legit anchor points in my memory... Stuff as simple as ruffling my hair. I might have honestly cried that evening. It was so niceee.<br><br>
    Once a year you get to have this day for yourself. Keep it the way you like it.<br><br>
    <b>Have fuuuun!!</b>`,
  }
];

let currentIndex = 0;
const targetVolume = 0.2; 
const fadeDuration = 3000; 

function startWrapped() {
  document.getElementById('story-mode').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('story-mode').style.opacity = '1';
  }, 50);

  const bgMusic = document.getElementById('bg-music');
  bgMusic.volume = 0; 
  if (bgMusic.src && !bgMusic.src.endsWith("html")) { 
      bgMusic.play().then(() => {
          const intervalTime = 50; 
          const volumeStep = targetVolume / (fadeDuration / intervalTime);
          const fadeAudio = setInterval(() => {
            if (bgMusic.volume < targetVolume) {
              bgMusic.volume = Math.min(bgMusic.volume + volumeStep, targetVolume);
            } else {
              clearInterval(fadeAudio);
            }
          }, intervalTime);
      }).catch(e => console.log("Audio waiting for user link."));
  }

  setupProgressBars();
  renderStory();
}

function setupProgressBars() {
  const container = document.getElementById('progress-container');
  container.innerHTML = '';
  data.forEach((_, i) => {
    container.innerHTML += `
      <div class="progress-bar" id="bar-${i}">
        <div class="progress-fill"></div>
      </div>
    `;
  });
}

function renderStory() {
  const d = data[currentIndex];
  
  data.forEach((_, i) => {
    const bar = document.getElementById(`bar-${i}`);
    if (i <= currentIndex) bar.classList.add('completed');
    else bar.classList.remove('completed');
  });

  const card = document.getElementById('active-card');
  const title = document.getElementById('story-title');
  const body = document.getElementById('story-body');
  const extra = document.getElementById('extra-content');

  card.style.animation = 'none';
  card.offsetHeight; 
  card.style.animation = null; 

  title.innerText = d.title;
  body.innerHTML = d.body; 

  extra.innerHTML = '';
  if(d.extra) {
    extra.innerHTML = `
      <button class="reveal-btn" onclick="toggleReveal(event)">Tap to Inspect 🔍</button>
      <div class="reveal-text" id="reveal">${d.extra}</div>
    `;
  }
}

function toggleReveal(e) {
  e.stopPropagation(); 
  const r = document.getElementById("reveal");
  r.style.display = r.style.display === "block" ? "none" : "block";
}

function nextStory() {
  if (currentIndex < data.length - 1) {
    currentIndex++;
    renderStory();
  } else {
    document.getElementById('story-mode').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('story-mode').style.display = 'none';
        currentIndex = 0; 
    }, 1000); 
    
    const bgMusic = document.getElementById('bg-music');
    bgMusic.pause();
    bgMusic.currentTime = 0; 
  }
}

function prevStory() {
  if (currentIndex > 0) {
    currentIndex--;
    renderStory();
  }
}
</script>

</body>
</html>
